spring.application.name=ucmp-backend

server.port=8081

# Database (dev)
# Defaults to Neon URL (so app can run even if local Postgres is down).
# Use env vars to switch to local Postgres when needed.
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-damp-sound-a13jdu4l-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Disable H2
spring.h2.console.enabled=false

# Seed data (DEV only)
app.seed.enabled=${APP_SEED_ENABLED:true}

# Security (DEV only; remove/disable for production)
spring.security.user.name=${SPRING_SECURITY_USER:admin}
spring.security.user.password=${SPRING_SECURITY_PASSWORD:temp}

# JWT settings (use env vars; defaults are DEV only)
jwt.secret=${JWT_SECRET:dev-only-change-me-please-dev-only-change-me-please}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

logging.level.org.springframework.web=DEBUG