spring.application.name=ucmp-backend-test

# Use in-memory DB for tests (no external Postgres needed)
spring.datasource.url=jdbc:h2:mem:ucmp_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Don’t run seeders in tests
app.seed.enabled=false

# JWT defaults for tests
jwt.secret=test-only-change-me-please-test-only-change-me-please
jwt.expiration=3600000

