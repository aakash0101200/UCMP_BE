services:
  postgres:
    image: postgres:15
    container_name: ucmp-postgres
    environment:
      POSTGRES_DB: ucmpdb
      POSTGRES_USER: ucmpuser
      POSTGRES_PASSWORD: securepassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data


  pgadmin:
    image: dpage/pgadmin4
    container_name: ucmp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ucmp.edu
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
volumes:
  postgres-data: